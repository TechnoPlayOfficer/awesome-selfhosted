version: "3.9"
services:
  oracle-backend:
    build: ./backend-oracle
    ports: ["3001:3001"]
    env_file: .env
    depends_on: [postgres]

  frontend:
    build: ./frontend-dashboard
    ports: ["3000:3000"]
    env_file: .env

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accet_oracle
      POSTGRES_USER: accet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accet_dev}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  docuseal:
    image: docuseal/docuseal:latest
    ports: ["3010:3000"]
    volumes: [docuseal_data:/data]

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports: ["5678:5678"]
    volumes: [n8n_data:/home/node/.n8n]

volumes:
  pgdata:
  docuseal_data:
  n8n_data:
